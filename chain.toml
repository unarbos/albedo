# Albedo-Mini-1.7B — Genesis king is ricdomolm/mini-coder-1.7b
# (the same model that generated the SWE-ZERO-12M-trajectories dataset).
# After scripts/seed_genesis.py uploads the genesis to Hippius, paste the
# returned OCI digest into [seed].seed_digest.
[chain]
name = "Albedo-Mini-1.7B"
seed_repo = "ricdomolm/mini-coder-1.7b"
# Hippius registry requires lowercase repo paths; pattern matches miner uploads.
repo_pattern = "^[^/]+/albedo-mini-1.7b-.+$"

[arch]
# Mini-coder-1.7b is Qwen3ForCausalLM under the hood. The archs.qwen3_minicoder
# module is a thin shim that just imports transformers so the HF Auto*
# registry resolves both king and challenger without trust_remote_code.
module = "archs.qwen3_minicoder"
extra_lock_keys = [
  "max_position_embeddings",
  "tie_word_embeddings",
  "rope_theta",
]

[seed]
tokenizer_repo = "ricdomolm/mini-coder-1.7b"
repo_backend = "hf"
# Pinned HF commit for ricdomolm/mini-coder-1.7b (genesis king weights).
seed_digest = "hf:ea686024d9522260933aeed436e9939b1912ca15"

[judge]
# Each duel runs every model in this list as an independent judge. Per-judge
# scores are reported separately in the dashboard (one bar each, like
# affine.io's per-environment bars). Dethrone rule: beat the king on at least
# one judge dimension (mean delta > tie_band) and tie-or-better on every other
# (no dimension with mean delta < -tie_band). Add or remove models without
# code edits — the eval server reads this list at duel time.
models = [
  "deepseek-ai/DeepSeek-V3.2-TEE",
  "Qwen/Qwen3-235B-A22B-Thinking-2507",
  "moonshotai/Kimi-K2.6-TEE",
]
base_url_env = "CHUTES_BASE_URL"   # default: https://llm.chutes.ai/v1
api_key_env  = "CHUTES_API_KEY"    # cpk_... bearer token
temperature  = 0.0
max_tokens   = 256
# Thinking / TEE judges emit a long internal trace before the JSON verdict.
# At 256 tokens the budget is consumed by reasoning alone (content=null).
thinking_max_tokens = 4096
thinking_models = [
  "Qwen/Qwen3-235B-A22B-Thinking-2507",
  "moonshotai/Kimi-K2.6-TEE",
]
# When the judge returns malformed JSON or an unknown verdict the parser
# scores it as `reject`. Below are the strictness/cost knobs.
retry_max    = 3
retry_initial_backoff_s = 1.5
# |chal_mean - king_mean| <= tie_band -> per-judge TIE; > tie_band -> WIN;
# < -tie_band -> LOSE. These per-judge outcomes gate dethrone (see [judge]).
tie_band     = 0.01

[dataset]
# Full SWE-ZERO parquet corpus from HuggingFace. Prefetch once with
# scripts/prefetch_dataset.py, then sample locally across all shards.
repo        = "AlienKevin/SWE-ZERO-12M-trajectories"
shard_glob  = "data/train-*.parquet"
# sha256 of manifest.json produced by prefetch_dataset.py; eval refuses
# to start if the on-disk manifest drifts from this pin.
manifest_sha256 = "982a92bd85d122d287b15f2ddb4e2050b9e345fb3921aa9a63382c7af022bd7f"

[duel]
n_samples = 64
max_turns_per_sample = 10
# Dethrone: wins>=1 AND loses==0 across judge dimensions, plus ensemble
# LCB at gate_alpha must be > 0 (see gate_alpha below).
alpha = 0.001          # one-sided LCB for reporting/diagnostics
gate_alpha = 0.05      # softer alpha used as the statistical gate
bootstrap_resamples = 10000
# Per-side completion budget. The trajectory dataset was generated at T=1.0
# with 32k context cap; matching it keeps the comparison fair.
gen_temperature = 1.0
gen_max_tokens  = 1024
gen_max_model_len = 32768

# Rolling N-king payout. Emission is split equally across the current king
# and up to (king_chain_depth - 1) most recent dethroned kings. Hotkeys
# missing from the metagraph (deregistered) are dropped before the split
# and the remainder renormalizes to sum to 1. A dethroned miner therefore
# continues to earn for (king_chain_depth - 1) more transitions.
king_chain_depth = 5
