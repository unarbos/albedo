<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<title>ALBEDO</title>
<link rel="icon" type="image/svg+xml" href="css/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<header class="top-header">
  <div class="row">
    <a class="brand" href="./index.html">
      <img src="css/favicon.svg" width="18" height="18" alt="" aria-hidden="true">
      <span>Albedo</span>
    </a>
    <span class="updated" id="updated"></span>
    <div class="links">
      <a href="https://huggingface.co/datasets/AlienKevin/SWE-ZERO-12M-trajectories" target="_blank" rel="noopener" aria-label="SWE-ZERO dataset on Hugging Face" title="SWE-ZERO dataset on Hugging Face">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.66 3.58 3 8 3s8-1.34 8-3V5"/><path d="M4 11v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6"/></svg>
      </a>
      <a href="https://github.com/unarbos/albedo" target="_blank" rel="noopener" aria-label="GitHub" title="GitHub">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.4 7.86 10.93.58.1.79-.25.79-.55v-1.96c-3.2.7-3.88-1.54-3.88-1.54-.52-1.32-1.27-1.68-1.27-1.68-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.03 1.76 2.7 1.25 3.36.96.1-.74.4-1.25.73-1.54-2.55-.29-5.24-1.27-5.24-5.66 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .97-.31 3.18 1.18.92-.26 1.91-.39 2.89-.4.98.01 1.97.14 2.89.4 2.2-1.49 3.17-1.18 3.17-1.18.63 1.58.24 2.75.12 3.04.74.8 1.18 1.83 1.18 3.08 0 4.4-2.7 5.36-5.27 5.65.41.36.78 1.06.78 2.13v3.16c0 .31.21.66.79.55C20.21 21.4 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
      </a>
      <a class="header-chat" href="https://chat.albedo.tech/" target="_blank" rel="noopener"
         aria-label="Chat with the King" title="Chat with the King">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>King Chat</span>
      </a>
    </div>
  </div>
</header>

<main>

<section class="hero">
  <div class="hero-eyebrow">reigning champion</div>
  <h1 class="hero-king" id="hero-king">ALBEDO</h1>
  <div class="hero-sub" id="hero-sub"></div>
  <div class="hero-stats" id="hero-stats"></div>
  <button type="button" class="hero-llms" id="hero-llms-btn" aria-label="Copy llms.txt to clipboard">
    <span class="hero-llms-label">llms.txt</span>
    <svg width="11" height="11" viewBox="0 0 12 12" fill="none" aria-hidden="true">
      <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.3"/>
      <path d="M3 8H2.5C2.224 8 2 7.776 2 7.5V2.5C2 2.224 2.224 2 2.5 2H7.5C7.776 2 8 2.224 8 2.5V3" stroke="currentColor" stroke-width="1.3"/>
    </svg>
  </button>
</section>

<section class="section" id="reign">
  <div class="head"><span class="label">reign · weight holders</span></div>
  <div id="reign-wrap"><div class="empty">loading…</div></div>
</section>

<section class="section" id="evolution">
  <div class="head"><span class="label">king history</span></div>
  <div id="king-history-wrap"><div class="empty">loading…</div></div>
</section>


<section class="section" id="benchmarks">
  <div class="head"><span class="label">benchmarks</span><span class="meta" id="benchmarks-meta"></span></div>
  <div id="benchmarks-wrap"><div class="empty">loading…</div></div>
</section>

<section class="section" id="pipeline">
  <div class="head"><span class="label">queue</span><span class="meta" id="pipeline-meta"></span></div>
  <div id="pipeline-wrap"><div class="empty">loading…</div></div>
</section>

<section class="section" id="history">
  <div class="head"><span class="label">history</span><span class="meta" id="history-meta"></span></div>
  <div class="filter-bar">
    <input id="filter-input" type="search" placeholder="filter by uid / hotkey / model…" autocomplete="off" spellcheck="false">
  </div>
  <div class="data-table-wrap" id="history-wrap"><div class="empty">loading…</div></div>
</section>

<section class="section" id="fails">
  <div class="head"><span class="label">fails</span><span class="meta" id="fails-meta"></span></div>
  <div class="data-table-wrap" id="fails-wrap"><div class="empty">loading…</div></div>
</section>

</main>

<script type="module" src="js/pages/index.js"></script>
</body>
</html>
