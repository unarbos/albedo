<!DOCTYPE html>
<html lang="en">
<head>

<body>

<header class="top-header">

      </a>
    </div>
  </div>
</header>

<main>

<section class="hero">
  <div class="hero-eyebrow">reigning champion</div>
  <h1 class="hero-king" id="hero-king">ALBEDO</h1>
  <div class="hero-sub" id="hero-sub"></div>
  <div class="hero-stats" id="hero-stats"></div>
</section>

<section class="section" id="reign">
  <div class="head"><span class="label">reign · weight holders</span></div>
  <div id="reign-wrap"><div class="empty">loading…</div></div>
</section>

<section class="section" id="evolution">
  <div class="head"><span class="label">score evolution</span></div>
  <div id="chart-wrap"><div class="empty">loading…</div></div>
</section>

<section class="section" id="queue">
  <div class="head"><span class="label">queue</span><span class="meta" id="queue-meta"></span></div>
  <div class="data-table-wrap" id="queue-wrap"><div class="empty">loading…</div></div>
</section>

<section class="section" id="history">
  <div class="head"><span class="label">history</span><span class="meta" id="history-meta"></span></div>
  <div class="filter-bar">
    <input id="filter-input" type="search" placeholder="filter by uid / hotkey / model…" autocomplete="off" spellcheck="false">
  </div>
  <div class="data-table-wrap" id="history-wrap"><div class="empty">loading…</div></div>
</section>

<section class="section" id="fails">
  <div class="head"><span class="label">fails</span><span class="meta" id="fails-meta"></span></div>
  <div class="data-table-wrap" id="fails-wrap"><div class="empty">loading…</div></div>
</section>

</main>

<script type="module" src="js/pages/index.js?v=5"></script>
</body>
</html>
