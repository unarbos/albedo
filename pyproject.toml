[project]
name = "albedo-eval-service"
version = "0.1.0"
description = "Backend-side eval dispatcher/control service for the Albedo subnet."
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "httpx>=0.27.0",
    "psycopg[binary]>=3.2.0",
    "pydantic>=2.8.0",
    "pydantic-settings>=2.4.0",
    "uvicorn[standard]>=0.30.0",
]

[project.scripts]
albedo-eval-api = "albedo_eval_service.api:main"
albedo-eval-dispatcher = "albedo_eval_service.dispatcher:main"

[dependency-groups]
dev = [
    "pytest>=8.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/albedo_eval_service"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
