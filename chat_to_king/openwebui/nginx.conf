
load_module modules/ngx_http_js_module.so;
events { worker_connections 1024; }
http {
    js_import anon from /etc/nginx/anon.js;
    js_set    $anon_id anon.anonId;
    resolver 127.0.0.11 valid=30s ipv6=off;

    map $http_cf_connecting_ip $client_ip {
        ""      $binary_remote_addr;
        default $http_cf_connecting_ip;
    }
    limit_req_zone  $client_ip zone=chatreq:10m rate=25r/s;
    limit_conn_zone $client_ip zone=chatconn:10m;
    limit_req_status  429;
    limit_conn_status 429;

    server {
        listen 8080;
        server_name _;
        client_max_body_size 50m;

        location = /albedo-favicon.svg   { default_type image/svg+xml;       alias /etc/nginx/albedo-favicon.svg; }
        location = /__king/king-chat.js  { default_type application/javascript; alias /etc/nginx/king-chat.js; }
        location ~* ^/static/(favicon|apple-touch-icon|logo|splash) {
            default_type image/svg+xml;
            alias /etc/nginx/albedo-favicon.svg;
        }
        location = /__king/status {
            proxy_pass http://host.docker.internal:9202/health;
        }

        location / {
            limit_req  zone=chatreq burst=50 nodelay;
            limit_conn chatconn 25;

            proxy_set_header X-Anon-Id   "$anon_id@anon.local";
            proxy_set_header X-Anon-Name "$anon_id";
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Accept-Encoding "";

            proxy_buffering    off;
            proxy_read_timeout 600s;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            sub_filter_once off;
            sub_filter_types application/json;
            sub_filter ' (Open WebUI)' '';
            sub_filter '</head>' '<link rel="icon" type="image/svg+xml" href="/albedo-favicon.svg"><script src="/__king/king-chat.js" defer></script></head>';

            set $owui "albedo-king-chat-webui:8080";
            proxy_pass http://$owui$request_uri;
        }
    }
}
